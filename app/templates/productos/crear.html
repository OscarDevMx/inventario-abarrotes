{% extends 'base.html' %}

{% block title %}
Nuevo Producto
{% endblock %}

{% block header %}
<i class="bi bi-plus-circle-fill"></i>
Nuevo Producto
{% endblock %}

{% block content %}

<div class="form-card">

    <div class="form-toolbar">

        <div class="form-title">

            <i class="bi bi-box-seam"></i>

            <h4>Nuevo Producto</h4>

        </div>

    </div>

    <form
        method="POST"
        action="/productos/guardar">

        <div class="row g-4">

            <!-- Codigo -->

            <div class="col-md-6">

                <label class="form-label-premium">

                    Código Barras

                </label>

                <input
                    type="text"
                    name="codigo_barras"
                    class="form-control form-control-premium"
                    maxlength="12"
                    pattern="[0-9]{1,12}"
                    inputmode="numeric"
                    required>

            </div>

            <!-- Nombre -->

            <div class="col-md-6">

                <label class="form-label-premium">

                    Nombre

                </label>

                <input
                    type="text"
                    name="nombre"
                    maxlength="50"
                    class="form-control form-control-premium"
                    required>

            </div>

            <!-- Descripcion -->

            <div class="col-12">

                <label class="form-label-premium">

                    Descripción

                </label>

                <textarea
                    name="descripcion"
                    rows="3"
                    class="form-control form-control-premium"></textarea>

            </div>

            <!-- Precio -->

            <div class="col-md-4">

                <label class="form-label-premium">

                    Precio

                </label>

                <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    max="999"
                    maxlength="3"
                    name="precio"
                    class="form-control form-control-premium"
                    required>

            </div>

            <!-- Stock -->

            <div class="col-md-4">

                <label class="form-label-premium">

                    Stock

                </label>

                <input
                    type="number"
                    min="0"
                    max="9999"
                    maxlength="4"
                    name="stock_actual"
                    class="form-control form-control-premium"
                    required>

            </div>

            <!-- Stock minimo -->

            <div class="col-md-4">

                <label class="form-label-premium">

                    Stock Mínimo

                </label>

                <input
                    type="number"
                    min="0"
                    max="9999"
                    maxlength="4"
                    name="stock_minimo"
                    class="form-control form-control-premium"
                    required>

            </div>

            <!-- Categoria -->

            <div class="col-md-6">

                <label class="form-label-premium">

                    Categoría

                </label>

                <select
                    name="id_categoria"
                    class="form-select form-select-premium"
                    required>

                    {% for c in categorias %}
                    <option value="{{ c.id_categoria }}">
                        {{ c.nombre_categoria }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <!-- Proveedor -->

            <div class="col-md-6">

                <label class="form-label-premium">

                    Proveedor

                </label>

                <select
                    name="id_proveedor"
                    class="form-select form-select-premium"
                    required>

                    {% for p in proveedores %}
                    <option value="{{ p.id_proveedor }}">
                        {{ p.nombre }}
                    </option>
                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- Buttons -->

        <div class="form-actions">

            <a
                href="{{ url_for('productos.listar_productos') }}"
                class="btn btn-cancel-form">

                <i class="bi bi-arrow-left"></i>
                
                Cancelar

            </a>

            <button
                type="submit"
                class="btn btn-save-form">

                <i class="bi bi-check-circle"></i>

                Guardar

            </button>

        </div>

    </form>

</div>

{% endblock %}
